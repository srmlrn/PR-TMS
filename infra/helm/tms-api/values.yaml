replicaCount: 2

image:
  repository: gcr.io/PROJECT_ID/tms-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

tenant:
  id: ""
  slug: ""
  environment: prod

namespace: tms-default-prod

database:
  secretName: tms-db-credentials
  secretKey: DATABASE_URL

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

env:
  STORAGE_MODE: postgres
  NODE_ENV: production
