<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0508"/>
      <stop offset="35%" stop-color="#5c1018"/>
      <stop offset="70%" stop-color="#b8321a"/>
      <stop offset="100%" stop-color="#f0a030"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#ffd080" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#e85a20" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#120408" stop-opacity="0"/>
      <stop offset="100%" stop-color="#080204" stop-opacity="0.92"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <!-- Mandala rings -->
  <circle cx="800" cy="360" r="280" fill="none" stroke="#ffd080" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="800" cy="360" r="220" fill="none" stroke="#ffd080" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="800" cy="360" r="160" fill="none" stroke="#ffd080" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Ganesha silhouette (stylized) -->
  <g transform="translate(800 330)" opacity="0.35" fill="#ffe8c8">
    <ellipse cx="0" cy="20" rx="95" ry="105"/>
    <ellipse cx="-55" cy="-30" rx="42" ry="58" transform="rotate(-18)"/>
    <ellipse cx="55" cy="-30" rx="42" ry="58" transform="rotate(18)"/>
    <path d="M-18 -95 Q0 -125 18 -95 L12 -55 Q0 -40 -12 -55 Z"/>
    <ellipse cx="0" cy="95" rx="38" ry="28"/>
  </g>
  <!-- Temple gopuram -->
  <g transform="translate(800 620)" fill="#1a0808" opacity="0.75">
    <rect x="-220" y="0" width="440" height="120" rx="4"/>
    <path d="M-180 0 L-140 -80 L-100 0 Z"/>
    <path d="M-60 0 L-20 -110 L20 0 Z"/>
    <path d="M60 0 L100 -80 L140 0 Z"/>
    <path d="M-20 0 L0 -150 L20 0 Z" fill="#2a1010"/>
    <rect x="-30" y="-150" width="60" height="18" rx="2" fill="#3a1818"/>
  </g>
  <rect width="1600" height="900" fill="url(#ground)"/>
</svg>
