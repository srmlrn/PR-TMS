<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050818"/>
      <stop offset="40%" stop-color="#0c1f4a"/>
      <stop offset="75%" stop-color="#1a3d7a"/>
      <stop offset="100%" stop-color="#c9882a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="42%">
      <stop offset="0%" stop-color="#f5d080" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#c97820" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1830"/>
      <stop offset="100%" stop-color="#040810"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#040810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020408" stop-opacity="0.95"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <circle cx="800" cy="320" r="260" fill="none" stroke="#f0c860" stroke-opacity="0.07" stroke-width="2"/>
  <circle cx="800" cy="320" r="190" fill="none" stroke="#f0c860" stroke-opacity="0.05" stroke-width="1"/>
  <!-- Venkateswara silhouette -->
  <g transform="translate(800 300)" opacity="0.35" fill="#ffe8b0">
    <ellipse cx="0" cy="30" rx="70" ry="95"/>
    <circle cx="0" cy="-55" r="48"/>
    <path d="M-55 -20 Q-95 10 -75 55 L-35 40 Z"/>
    <path d="M55 -20 Q95 10 75 55 L35 40 Z"/>
    <path d="M-22 -95 L0 -130 L22 -95 L14 -72 L-14 -72 Z"/>
    <ellipse cx="0" cy="108" rx="55" ry="18"/>
  </g>
  <!-- Hill & temple -->
  <ellipse cx="800" cy="780" rx="720" ry="200" fill="url(#hill)" opacity="0.9"/>
  <g transform="translate(800 540)" fill="#081428" opacity="0.8">
    <rect x="-160" y="80" width="320" height="90" rx="3"/>
    <path d="M-120 80 L-90 20 L-60 80 Z"/>
    <path d="M-30 80 L0 -20 L30 80 Z"/>
    <path d="M60 80 L90 20 L120 80 Z"/>
    <path d="M0 80 L0 -55 L-25 -55 L0 -80 L25 -55 L0 -55 Z" fill="#0c1c38"/>
    <rect x="-18" y="-95" width="36" height="20" rx="2" fill="#142850"/>
  </g>
  <rect width="1600" height="900" fill="url(#ground)"/>
</svg>
