<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" fill="none">
  <defs>
    <linearGradient id="ganeshaGold" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#fff4dc"/>
      <stop offset="35%" stop-color="#f0c060"/>
      <stop offset="70%" stop-color="#d89030"/>
      <stop offset="100%" stop-color="#a86018"/>
    </linearGradient>
    <linearGradient id="ganeshaGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#c87820" stop-opacity="0.75"/>
    </linearGradient>
    <radialGradient id="ganeshaAura" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ffd878" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#e89030" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="ganeshaSoftGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Soft halo -->
  <ellipse cx="240" cy="280" rx="200" ry="240" fill="url(#ganeshaAura)"/>
  <!-- Lord Ganesha  seated, stylized silhouette -->
  <g filter="url(#ganeshaSoftGlow)" fill="url(#ganeshaGold)">
    <!-- Lotus seat -->
    <ellipse cx="240" cy="560" rx="130" ry="28" opacity="0.85"/>
    <path d="M110 555 Q240 520 370 555 Q240 590 110 555 Z" opacity="0.7"/>
    <!-- Body -->
    <ellipse cx="240" cy="420" rx="88" ry="105"/>
    <!-- Dhoti fold -->
    <path d="M152 460 Q240 500 328 460 L310 520 Q240 545 170 520 Z" fill="url(#ganeshaGlow)" opacity="0.9"/>
    <!-- Left arm (modak) -->
    <path d="M152 380 Q90 360 75 310 Q95 295 120 320 Q135 350 160 365 Z"/>
    <!-- Right arm (blessing) -->
    <path d="M328 380 Q390 350 405 290 Q385 275 360 300 Q345 340 320 365 Z"/>
    <!-- Upper arms -->
    <ellipse cx="175" cy="340" rx="28" ry="48" transform="rotate(-25 175 340)"/>
    <ellipse cx="305" cy="340" rx="28" ry="48" transform="rotate(25 305 340)"/>
    <!-- Elephant head -->
    <ellipse cx="240" cy="280" rx="105" ry="95"/>
    <!-- Ears -->
    <ellipse cx="145" cy="265" rx="52" ry="72" transform="rotate(-22 145 265)"/>
    <ellipse cx="335" cy="265" rx="52" ry="72" transform="rotate(22 335 265)"/>
    <!-- Trunk -->
    <path d="M240 310 Q220 380 195 430 Q210 440 225 420 Q245 370 260 320 Q260 300 240 310 Z"/>
    <!-- Crown / mukut -->
    <path d="M200 210 Q240 165 280 210 L270 235 Q240 220 210 235 Z"/>
    <circle cx="240" cy="195" r="12" fill="#fff8e8"/>
    <!-- Tusk hint -->
    <path d="M218 318 L205 345 L215 340 Z" fill="#fff8e8" opacity="0.85"/>
  </g>
</svg>
