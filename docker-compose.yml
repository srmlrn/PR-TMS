services:
  postgres:
    image: postgres:16-alpine
    container_name: tms-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: tms
      POSTGRES_PASSWORD: tms_dev
      POSTGRES_DB: tms_control
    volumes:
      - tms_pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init-control-plane.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tms -d tms_control']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tms_pg_data:
